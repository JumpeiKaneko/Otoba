<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOBA | 睡蓮 - ジヴェルニーの庭</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-image"></div>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="noise-overlay"></div>

    <div id="bg-trigger" class="background-trigger"></div>

    <main class="wrapper">
        <div class="reveal-target">
            
            <div class="album-header">
                <h1 class="logo">OTOBA</h1>
                <p class="subtitle">睡蓮 - ジヴェルニーの庭</p>
            </div>

            <p class="instruction">
                端末の音量を上げ、枠のどれかを押して<br>空間に参加してください。
            </p>

            <div class="square-container">
                <a href="build_water/index.html" class="square-btn hover-target"></a>
                <a href="build_grass/index.html" class="square-btn hover-target"></a>
                <a href="build_frog/index.html" class="square-btn hover-target"></a>
                <a href="build_insect/index.html" class="square-btn hover-target"></a>
                <a href="build_bird/index.html" class="square-btn hover-target"></a>
            </div>

        </div>
    </main>

    <script>
        const bgImage = document.getElementById('bg-image');
        const bgTrigger = document.getElementById('bg-trigger');

        // 背景切り替えの処理（【修正】専用レイヤーをクリック検知対象に）
        if (bgTrigger && bgImage) {
            bgTrigger.addEventListener('click', () => {
                // 背景画像の表示・非表示クラスを切り替える
                bgImage.classList.toggle('is-visible');
            });
        }

        // カスタムカーソルの処理（変更なし）
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        const hoverTargets = document.querySelectorAll('.hover-target');

        if (window.matchMedia("(pointer: fine)").matches) {
            document.addEventListener('mousemove', (e) => {
                cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
                setTimeout(() => { follower.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`; }, 80);
            });
            hoverTargets.forEach(target => {
                target.addEventListener('mouseenter', () => { cursor.classList.add('is-active'); follower.classList.add('is-active'); });
                target.addEventListener('mouseleave', () => { cursor.classList.remove('is-active'); follower.classList.remove('is-active'); });
            });
        }
    </script>
</body>
</html>
